name: Preflight

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install Dependencies
        run: npm ci
        env:
          POSTGRES_PRISMA_URL: postgresql://user:pass@localhost:5432/db

      - name: Typecheck
        run: npm run typecheck
        env:
          POSTGRES_PRISMA_URL: postgresql://user:pass@localhost:5432/db

      - name: Test
        run: npm run test
        env:
          POSTGRES_PRISMA_URL: postgresql://user:pass@localhost:5432/db

      - name: Build
        run: npm run build
        env:
          POSTGRES_PRISMA_URL: postgresql://user:pass@localhost:5432/db
